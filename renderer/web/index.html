<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!--link rel="icon" href="./media/gotcha.jpg" type="image/x-icon"-->
	<title>kosmos on da web</title>
	<style>
		body {
			margin: 0;
			height: 100vh;
			display: grid;
			place-items: center;
			background: black;
		}

		canvas {
    		image-rendering: crisp-edges;
		}
	</style>
</head>
<body>
	<canvas id="canvas">
		<script>
			// Handle user inputs
			let delta_x = 0, delta_y = 0, dont_record_delta = true

			canvas.addEventListener("click", async () => {
				await canvas.requestPointerLock()
			})

			document.addEventListener('mousedown', (event) => {
				if (event.button === 2) (dont_record_delta = false)
			})

			document.addEventListener('mouseup', (event) => {
				if (event.button === 2) (dont_record_delta = true)
			})

			document.addEventListener('mousemove', (event) => {
				if (dont_record_delta) return
				delta_x = event.movementX || 0
				delta_y = event.movementY || 0
			})

			let forward_move = false, back_move = false
			let left_move = false, right_move = false
			let up_move = false, down_move = false

			document.addEventListener('keydown', (event) => {
				const key = event.key.toUpperCase()
				if      (key === 'W') (forward_move = true)
				else if (key === 'S') (back_move = true)
				else if (key === 'A') (left_move = true)
				else if (key === 'D') (right_move = true)
				else if (key === 'E') (up_move = true)
				else if (key === 'Q') (down_move = true)
			})

			document.addEventListener('keyup', (event) => {
				const key = event.key.toUpperCase()
				if      (key === 'W') (forward_move = false)
				else if (key === 'S') (back_move = false)
				else if (key === 'A') (left_move = false)
				else if (key === 'D') (right_move = false)
				else if (key === 'E') (up_move = false)
				else if (key === 'Q') (down_move = false)
			})

			function get_user_inputs() {
				// Fetch mouse delta
				const dx = delta_x
				const dy = delta_y
				// * Reset after reading so we don't keep
				//  moving even when the mouse stops
				delta_x = 0
				delta_y = 0
				// Calculate move direction
				const right = (left_move ? 1 : 0) - (right_move ? 1 : 0)
				const up = (up_move ? 1 : 0) - (down_move ? 1 : 0)
				const forward = (forward_move ? 1 : 0) - (back_move ? 1 : 0)
				return { "dx": dx, "dy": dy, "right": right, "up": up, "forward": forward }
			}

			const socket = new WebSocket('ws://localhost:8080');

			const ctx = canvas.getContext("2d");
			let width = 0;
			let height = 0;

			// Connection opened
			socket.addEventListener('open', (event) => {
				console.log("[Client]: Websocket opened!");
			});

			// Listen for messages from the server
			socket.addEventListener('message', async (event) => {
				const data_type = typeof event.data;
				if (data_type == "string") {
					const json = JSON.parse(event.data);
					console.log('[Client]: Received JSON:', json);

					width = json.width;
					height = json.height;

					// Adapt the canvas to the program configurations
					canvas.width = width;
					canvas.height = height;

					canvas.style.width = "100vw";
					canvas.style.height = "100vh";
					canvas.style.objectFit = "contain";

				} else if (data_type == "object") {
					// Convert the BLOB into a buffer
					const buffer = await (event.data).arrayBuffer();

					// DEBUG:
					//console.log('[Client]: Received data:', buffer);

					// Wrap the buffer in a Uint8ClampedArray view
					const pixel_array_view = new Uint8ClampedArray(buffer);
					// Create the ImageData object
					const image_data = new ImageData(pixel_array_view, width, height);
					// Paint it onto the canvas context
					ctx.putImageData(image_data, 0, 0);

					socket.send(JSON.stringify(get_user_inputs()));
				}
			});
			
			// Connection closed
			socket.addEventListener('close', (event) => {
				console.log("[Client]: Websocket closed!");
			});
		</script>
	</canvas>
</body>
</html>
